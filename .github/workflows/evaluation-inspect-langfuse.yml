# Maintainer-only diagnostic: inventory Langfuse session for a job request and upload
# a public-safe acceptance summary only. Uses existing Langfuse secrets; never prints credentials.
# Read-only inspect — no reprojection, no public artifact downloads, no private report upload.
name: evaluation-inspect-langfuse

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Opaque job request id
        required: true
        type: string
      namespace:
        description: P_DEV_EVALUATION_NAMESPACE
        required: false
        default: weston-dogfood
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      P_DEV_PUBLIC_RUNNER_MODE: "1"
      P_DEV_WORKFLOW_STATE_STORE_MODE: managed_github
      P_DEV_WORKFLOW_STATE_REPOSITORY: ${{ vars.P_DEV_WORKFLOW_STATE_REPOSITORY }}
      P_DEV_WORKFLOW_STATE_BRANCH: ${{ vars.P_DEV_WORKFLOW_STATE_BRANCH }}
      P_DEV_JOB_REQUEST_REPOSITORY: ${{ vars.P_DEV_JOB_REQUEST_REPOSITORY }}
      P_DEV_STATE_GITHUB_TOKEN: ${{ secrets.P_DEV_STATE_GITHUB_TOKEN }}
      REQUEST_ID: ${{ inputs.request_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Claim job request
        run: |
          npm run harness:claim-job-request -- --request-id "$REQUEST_ID" --json
      - name: Run Langfuse inspect
        env:
          P_DEV_EVALUATION_PROVIDER: langfuse
          P_DEV_EVALUATION_CAPTURE_PROFILE: content-v1
          P_DEV_EVALUATION_NAMESPACE: ${{ inputs.namespace }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
          LANGFUSE_TRACING_ENVIRONMENT: ${{ vars.LANGFUSE_TRACING_ENVIRONMENT }}
        run: |
          set -euo pipefail
          mkdir -p runs/evaluation-reports
          REPORT="runs/evaluation-reports/public-inspect-${{ github.run_id }}.json"
          npm run evaluation:inspect-langfuse -- \
            --namespace "${{ inputs.namespace }}" \
            --out "$REPORT" \
            --json
      - name: Assert Langfuse inspect acceptance
        run: |
          set -euo pipefail
          REPORT="runs/evaluation-reports/public-inspect-${{ github.run_id }}.json"
          if [ ! -f "$REPORT" ]; then
            echo "Missing Langfuse public inspect summary."
            exit 1
          fi
          # Pass path via env: `node <<EOF "$REPORT"` makes Node treat the JSON as an ESM entry.
          REPORT_PATH="$REPORT" npx tsx <<'EOF'
          import { readFileSync } from "node:fs";
          import { assertPublicSafe } from "./src/public-execution/redaction-validator.ts";
          import { publicSummaryAcceptancePassed } from "./src/evaluation/langfuse-inspect/public-summary.ts";
          import type { LangfuseInspectPublicSummary } from "./src/evaluation/langfuse-inspect/types.ts";

          const reportPath = process.env.REPORT_PATH;
          if (!reportPath) {
            console.error("Missing REPORT_PATH.");
            process.exit(1);
          }
          const bytes = readFileSync(reportPath, "utf8");
          let parsed: LangfuseInspectPublicSummary;
          try {
            parsed = JSON.parse(bytes) as LangfuseInspectPublicSummary;
          } catch (error) {
            console.error("Malformed Langfuse inspect report JSON.");
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          }
          try {
            assertPublicSafe(bytes);
          } catch (error) {
            console.error("Public summary failed assertPublicSafe.");
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          }
          const acceptance = parsed.acceptance;
          const requiredGenerationCount = Number(acceptance?.requiredGenerationCount ?? 0);
          const incompleteRequiredGenerationCount = Number(
            acceptance?.incompleteRequiredGenerationCount ?? -1,
          );
          const errorGapCount = Number(acceptance?.errorGapCount ?? -1);
          const privacyOk = acceptance?.privacyValidationPassed === true;
          const complete = acceptance?.complete === true;
          const generationCostComplete = acceptance?.generationCostComplete === true;
          if (
            !complete ||
            !generationCostComplete ||
            !(requiredGenerationCount > 0) ||
            incompleteRequiredGenerationCount !== 0 ||
            errorGapCount !== 0 ||
            !privacyOk ||
            !publicSummaryAcceptancePassed(parsed)
          ) {
            console.error("Langfuse inspect acceptance failed.");
            console.error(`acceptance.complete=${String(complete)}`);
            console.error(`acceptance.generationCostComplete=${String(generationCostComplete)}`);
            console.error(`requiredGenerationCount=${String(requiredGenerationCount)}`);
            console.error(`incompleteRequiredGenerationCount=${String(incompleteRequiredGenerationCount)}`);
            console.error(`errorGapCount=${String(errorGapCount)}`);
            console.error(`privacyValidationPassed=${String(privacyOk)}`);
            const gapCodeCounts =
              parsed.gapCodeCounts && typeof parsed.gapCodeCounts === "object"
                ? parsed.gapCodeCounts
                : {};
            for (const [code, count] of Object.entries(gapCodeCounts).slice(0, 20)) {
              console.error(`- [${code}] x${count}`);
            }
            process.exit(1);
          }
          console.log("Langfuse inspect acceptance passed.");
          EOF
      - name: Upload public-safe summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-inspect-${{ github.run_id }}
          path: runs/evaluation-reports/public-inspect-${{ github.run_id }}.json
          if-no-files-found: error
          retention-days: 1
